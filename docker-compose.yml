networks:
  devsecops:
    driver: bridge

volumes:
  jenkins_home:
  trivy_cache:

services:

  # ─── Application FastAPI demo ──────────────────────────────
  app:
    build: .
    container_name: devsecops-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - API_SECRET_TOKEN=demo-token-changeme
      - APP_VERSION=1.0.0
    networks:
      - devsecops

  # ─── Jenkins ───────────────────────────────────────────────
  jenkins:
    build: ./jenkins
    container_name: jenkins
    user: root
    restart: unless-stopped
    ports:
      - "8080:8080"   # UI Jenkins
      - "50000:50000" # agents JNLP
    volumes:
      - jenkins_home:/var/jenkins_home
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - devsecops

  # Registre local compatible Docker Registry.
  registry:
    image: registry:2
    container_name: local-registry
    restart: unless-stopped
    ports:
      - "8090:5000"
    networks:
      - devsecops

  # ─── Gitea (Git local, remplace GitHub) ─────────────────────
  gitea:
    image: gitea/gitea:1.21
    container_name: gitea
    restart: unless-stopped
    ports:
      - "3000:3000"   # UI Gitea
      - "2222:22"     # SSH Git
    volumes:
      - ./gitea_data:/data
    environment:
      - USER_UID=1000
      - USER_GID=1000
    networks:
      - devsecops

  # ─── Trivy cache server (optionnel, accélère les scans) ─────
  trivy-cache:
    image: aquasec/trivy:latest
    container_name: trivy-cache
    command: server --listen 0.0.0.0:4954
    ports:
      - "4954:4954"
    volumes:
      - trivy_cache:/root/.cache/trivy
    networks:
      - devsecops
