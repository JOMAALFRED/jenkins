# Configuration file of Harbor

# The IP address or hostname to access admin UI and registry service.
# DO NOT use localhost or 127.0.0.1, because Harbor needs to be accessed by external clients.
# For local Docker Desktop usage, we use the host IP directly.
hostname: 10.1.1.100

# HTTP related config
http:
  # port for http, default is 80. If https enabled, this port will redirect to https port
  port: 80

# HTTPS related config — DISABLED for local development
# https:
#   # https port for harbor, default is 443
#   port: 443
#   # The path of cert and key files for nginx
#   certificate: /your/certificate/path
#   private_key: /your/private/key/path

# # Uncomment following will enable tls communication between all harbor components
# internal_tls:
#   # set enabled to true means internal tls is enabled
#   enabled: true
#   # put your cert and key files on dir
#   dir: /etc/harbor/tls/internal

# Uncomment external_url if you want to enable external proxy
# external_url: https://reg.mydomain.com:8433

# The initial password of Harbor admin
# It only works in first time to install harbor
# Remember Change the admin password from UI after launching Harbor.
harbor_admin_password: Harbor12345

# Harbor DB configuration
database:
  # The password for the root user of Harbor DB. Change this before any production use.
  password: root123
  # The maximum number of connections in the idle connection pool.
  max_idle_conns: 100
  # The maximum number of open connections to the database.
  max_open_conns: 900
  # The maximum amount of time a connection may be reused. Defaults to 0 (no limit)
  conn_max_lifetime: 5m
  # The maximum amount of time a connection may be idle. Defaults to 0 (no limit)
  conn_max_idle_time: 0

# The default data volume
data_volume: /data/harbor

# Harbor Storage settings by default is using /data dir on local filesystem
# Uncomment storage_service setting If you want to using external storage
# storage_service:
#   # ca_bundle is the path to the custom root ca certificate, which will be injected
#   # into the truststore of registry's and chart repository's containers.
#   ca_bundle:
#   # storage backend, default is filesystem, options include filesystem, azure, gcs, s3, swift and oss
#   # for more info about this configuration please refer https://docs.docker.com/registry/configuration/
#   filesystem:
#     maxthreads: 100
#   # set disable to true when you want to disable registry redirect
#   redirect:
#     disabled: false

# Trivy configuration
trivy:
  # ignoreUnfixed The flag to display only fixed vulnerabilities
  ignore_unfixed: false
  # skipUpdate The flag to enable or disable Trivy DB downloads from GitHub
  skip_update: false
  # The flag to enable or disable Trivy DB downloads from GitHub for the Java index
  skip_java_db_update: false
  # offline_scan The flag to disable Trivy DB downloads
  offline_scan: false
  # Comma-separated list of what security issues to detect. Defaults to all (select from vuln,config,secret)
  security_check: vuln
  # insecure The flag to skip verifying registry certificate
  insecure: false
  # github_token The GitHub access token to download Trivy DB
  # github_token: xxx

# jobservice configuration
jobservice:
  # Maximum number of job workers in job service
  max_job_workers: 10
  # The jobLoggers backend name, only support "STD_OUTPUT", "FILE" and/or "DB"
  job_loggers:
    - STD_OUTPUT
    - FILE
  # The jobLogger sweeper duration (ignored if jobLoggers is STD_OUTPUT)
  logger_sweeper_duration: 14 # unit: day

# notification configuration
notification:
  # Maximum retry count for webhook job
  webhook_job_max_retry: 3
  # HTTP client timeout for webhook job
  webhook_job_http_client_timeout: 10 # unit: second

# Log configurations
log:
  # options are debug, info, warning, error, fatal
  level: info
  # configs for logs in local storage
  local:
    # Log files are rotated log_rotate_count times before being removed.
    rotate_count: 50
    # Log files are rotated only if they grow bigger than log_rotate_size bytes.
    rotate_size: 200M
    # The directory on your host that store log
    location: /var/log/harbor

# This attribute is for migrator to detect the version of the .cfg file,
# DO NOT MODIFY!
_version: 2.10.0

# Global proxy settings
# Config http proxy for Trivy, you can set a proxy globally in this section
# But it only works for Trivy scan (no proxy for other Harbor services)
proxy:
  http_proxy:
  https_proxy:
  no_proxy:
  components:
    - core
    - jobservice
    - trivy

# metric:
#   enabled: false
#   port: 9090
#   path: /metrics

# Trace related config
# trace:
#   enabled: true
#   # set sample_rate to 1 if you wanna sampling 100% of trace data; set 0.5 if you wanna sampling 50% of trace data, etc.
#   sample_rate: 1
#   # # namespace used to differentiate different harbor services
#   # namespace:
#   # # attributes is a key value dict contains user defined attributes used to initialize trace provider
#   # attributes:
#   #   application: harbor
#   # # jaeger related config
#   # jaeger:
#   #   endpoint: http://hostname:14268/api/traces
#   #   username:
#   #   password:
#   #   agent_host: hostname
#   #   # client_transport: grpc or udp
#   #   agent_port: 6831
#   # # otel related config
#   # otel:
#   #   endpoint: hostname:4318
#   #   url_path: /v1/traces
#   #   compression: false
#   #   insecure: true
#   #   # timeout is in seconds
#   #   timeout: 10

# Enable purge _upload directories
upload_purging:
  enabled: true
  # remove files in _upload directories which exist for a period of time, default is one week.
  age: 168h
  # the interval of the purge operations
  interval: 24h
  dryrun: false

cache:
  # not enabled by default
  enabled: false
  expire_hours: 24
